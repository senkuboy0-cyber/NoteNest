name: Build Debug APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK (arm64-v8a)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 9.5.1

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK (arm64-v8a)
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mkdir -p apk-output
          cp app/build/outputs/apk/debug/app-debug.apk apk-output/NoteNest-arm64-v8a-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoteNest-arm64-v8a-debug
          path: apk-output/NoteNest-arm64-v8a-debug.apk
          retention-days: 30

      - name: Upload APK to Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: apk-output/NoteNest-arm64-v8a-debug.apk
          generate_release_notes: true
